# Image builder — tags images for GHCR
# Usage: make docker-build
#
# docker compose -f docker/docker-compose.build.yml build backend
# docker compose -f docker/docker-compose.build.yml build frontend

services:
  backend:
    image: ghcr.io/nunenuh/docmind-vlm-backend:latest
    build:
      context: ../backend
      dockerfile: ../docker/images/Dockerfile.backend

  frontend:
    image: ghcr.io/nunenuh/docmind-vlm-frontend:latest
    build:
      context: ../frontend
      dockerfile: ../docker/images/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.docmind.nunenuh.me}
