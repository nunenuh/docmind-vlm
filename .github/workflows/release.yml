name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/nunenuh/docmind-vlm-backend
  FRONTEND_IMAGE: ghcr.io/nunenuh/docmind-vlm-frontend

jobs:
  # ── Reuse existing CI workflows ─────────────────────
  ci-backend:
    name: Backend CI
    uses: ./.github/workflows/ci-backend.yml

  ci-frontend:
    name: Frontend CI
    uses: ./.github/workflows/ci-frontend.yml

  # ── Semantic Release ────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [ci-backend, ci-frontend]
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install --no-fund --no-audit

      - name: Run semantic-release
        id: semantic
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Build and push Docker images on new release ─────
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.new_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: docker/images/Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:v${{ needs.release.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: docker/images/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:v${{ needs.release.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://api.docmind.nunenuh.me' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
