name: Deploy to ThinkCentre

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: "Services to deploy (all, backend, frontend)"
        required: false
        default: "all"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ghcr.io/nunenuh/docmind-vlm-backend:latest
  FRONTEND_IMAGE: ghcr.io/nunenuh/docmind-vlm-frontend:latest
  DEPLOY_PATH: /workspace/deployments/docmind-vlm

jobs:
  # ── Reuse existing CI workflows ─────────────────────
  ci-backend:
    name: Backend CI
    uses: ./.github/workflows/ci-backend.yml

  ci-frontend:
    name: Frontend CI
    uses: ./.github/workflows/ci-frontend.yml

  # ── Build Docker images ─────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [ci-backend, ci-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        if: github.event.inputs.services != 'frontend'
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }} \
            -f docker/images/Dockerfile.backend \
            backend/

      - name: Build frontend image
        if: github.event.inputs.services != 'backend'
        run: |
          docker build \
            --build-arg VITE_API_URL=https://api.docmind.nunenuh.me \
            -t ${{ env.FRONTEND_IMAGE }} \
            -f docker/images/Dockerfile.frontend \
            frontend/

      - name: Save images as artifacts
        run: |
          mkdir -p /tmp/images
          if [ "${{ github.event.inputs.services }}" != "frontend" ]; then
            docker save ${{ env.BACKEND_IMAGE }} | gzip > /tmp/images/backend.tar.gz
          fi
          if [ "${{ github.event.inputs.services }}" != "backend" ]; then
            docker save ${{ env.FRONTEND_IMAGE }} | gzip > /tmp/images/frontend.tar.gz
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/
          retention-days: 1

  # ── Deploy via Cloudflare Tunnel SSH ────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    environment: production
    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/

      - name: Install cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.THINKCENTRE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host thinkcentre
            HostName ${{ secrets.THINKCENTRE_HOSTNAME }}
            User root
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_SERVICE_TOKEN_ID }} --service-token-secret ${{ secrets.CF_SERVICE_TOKEN_SECRET }}
          EOF

      - name: Transfer and load images
        run: |
          for img in /tmp/images/*.tar.gz; do
            [ -f "$img" ] || continue
            echo "Transferring $(basename $img)..."
            cat "$img" | ssh thinkcentre "gunzip | docker load"
          done

      - name: Restart services
        run: |
          SERVICES="${{ github.event.inputs.services || 'all' }}"
          if [ "$SERVICES" = "all" ]; then
            ssh thinkcentre "cd ${{ env.DEPLOY_PATH }} && docker compose up -d backend frontend"
          else
            ssh thinkcentre "cd ${{ env.DEPLOY_PATH }} && docker compose up -d $SERVICES"
          fi

      - name: Run migrations
        if: github.event.inputs.services != 'frontend'
        run: |
          ssh thinkcentre "docker exec docmind-backend python -m alembic upgrade head" || true

      - name: Health check
        run: |
          sleep 10
          ssh thinkcentre "curl -sf http://localhost:8009/api/v1/health/ping" && echo "Backend: OK" || echo "Backend: FAILED"
          ssh thinkcentre "curl -sf http://localhost:5177/" > /dev/null && echo "Frontend: OK" || echo "Frontend: FAILED"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
